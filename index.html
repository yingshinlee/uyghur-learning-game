<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>大眾維語・學習小遊戲</title>
<style>
  :root{
    --bg1:#1a1a2e; --bg2:#16213e;
    --card:#0f3460; --accent:#e94560; --gold:#ffd369;
    --ok:#4ecca3; --bad:#e94560; --text:#eaeaea; --dim:#9aa5c4;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    font-family:"PingFang TC","Hiragino Sans","Microsoft JhengHei",sans-serif;
    background:linear-gradient(135deg,var(--bg1),var(--bg2));
    min-height:100vh;color:var(--text);
  }
  .uy{
    font-family:"Geeza Pro","Noto Naskh Arabic","Arial Unicode MS",serif;
    direction:rtl;unicode-bidi:isolate;
  }
  .wrap{max-width:760px;margin:0 auto;padding:20px 16px 60px;}
  header{display:flex;justify-content:space-between;align-items:center;padding:10px 0 24px;flex-wrap:wrap;gap:8px;}
  header h1{font-size:1.2rem;color:var(--gold);letter-spacing:1px;}
  .hright{display:flex;gap:8px;align-items:center;}
  .xpbox{background:rgba(255,255,255,.08);border-radius:20px;padding:6px 14px;font-size:.85rem;}
  .xpbox b{color:var(--gold);}
  .langbtn{
    background:rgba(255,211,105,.15);border:1px solid var(--gold);color:var(--gold);
    border-radius:20px;padding:6px 14px;font-size:.85rem;cursor:pointer;font-family:inherit;
  }

  /* ── 主選單 ── */
  .menu{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px;}
  .mcard{
    background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);
    border-radius:16px;padding:22px 18px;cursor:pointer;transition:.18s;
  }
  .mcard:hover{transform:translateY(-3px);background:rgba(255,255,255,.12);border-color:var(--gold);}
  .mcard .emoji{font-size:2rem;}
  .mcard h2{font-size:1.05rem;margin:10px 0 6px;color:var(--gold);}
  .mcard p{font-size:.82rem;color:var(--dim);line-height:1.5;}
  .intro{
    background:rgba(233,69,96,.12);border:1px solid rgba(233,69,96,.35);
    border-radius:14px;padding:14px 18px;margin-bottom:20px;font-size:.88rem;line-height:1.7;color:var(--dim);
  }
  .intro b{color:var(--text);}
  .intro .uy{font-size:1.1rem;color:var(--gold);}

  /* ── 共用 ── */
  .hidden{display:none!important;}
  .topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;flex-wrap:wrap;gap:8px;}
  .btn{
    background:var(--accent);color:#fff;border:none;border-radius:10px;
    padding:10px 20px;font-size:.95rem;cursor:pointer;font-family:inherit;transition:.15s;
  }
  .btn:hover{filter:brightness(1.15);}
  .btn.ghost{background:rgba(255,255,255,.12);}
  .btn.gold{background:var(--gold);color:#1a1a2e;font-weight:700;}
  .pill{background:rgba(255,255,255,.1);border-radius:20px;padding:5px 14px;font-size:.85rem;}
  .hearts{color:var(--accent);letter-spacing:2px;}
  .progress{height:8px;background:rgba(255,255,255,.12);border-radius:4px;overflow:hidden;margin-bottom:22px;}
  .progress i{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--gold));width:0;transition:.3s;}

  /* ── 題目 ── */
  .qcard{
    background:rgba(255,255,255,.07);border-radius:18px;padding:30px 22px;text-align:center;margin-bottom:20px;
  }
  .qcard .label{font-size:.85rem;color:var(--dim);margin-bottom:14px;line-height:1.6;}
  .qcard .big{font-size:3.2rem;line-height:1.4;}
  .qcard .big.uy{font-size:3.6rem;}
  .qcard .sub{font-size:1rem;color:var(--dim);margin-top:10px;}
  .opts{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  @media(max-width:520px){.opts{grid-template-columns:1fr;}}
  .opt{
    background:rgba(255,255,255,.08);border:2px solid transparent;border-radius:14px;
    padding:16px 12px;font-size:1.15rem;cursor:pointer;text-align:center;transition:.15s;color:var(--text);
    font-family:inherit;
  }
  .opt .uy{font-size:1.5rem;}
  .opt:hover{border-color:var(--gold);}
  .opt.correct{background:rgba(78,204,163,.25);border-color:var(--ok);}
  .opt.wrong{background:rgba(233,69,96,.25);border-color:var(--bad);}
  .opt:disabled{cursor:default;}
  .feedback{text-align:center;min-height:64px;margin-top:16px;font-size:.95rem;line-height:1.6;}
  .feedback .uy{color:var(--gold);}
  .combo{color:var(--gold);font-weight:700;}

  /* ── 翻翻樂 ── */
  .board{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
  @media(max-width:520px){.board{grid-template-columns:repeat(4,1fr);gap:6px;}}
  .tile{aspect-ratio:3/4;perspective:600px;cursor:pointer;}
  .tile-inner{
    position:relative;width:100%;height:100%;transition:transform .35s;transform-style:preserve-3d;
  }
  .tile.flip .tile-inner{transform:rotateY(180deg);}
  .face{
    position:absolute;inset:0;border-radius:12px;display:flex;align-items:center;justify-content:center;
    backface-visibility:hidden;padding:6px;text-align:center;
  }
  .face.back{background:linear-gradient(135deg,var(--accent),#903749);font-size:1.6rem;}
  .face.front{background:var(--card);transform:rotateY(180deg);font-size:.95rem;line-height:1.3;border:1px solid rgba(255,255,255,.18);}
  .face.front .uy{font-size:1.25rem;}
  .tile.done .face.front{background:rgba(78,204,163,.3);border-color:var(--ok);}
  .tile.done{cursor:default;}

  /* ── 學習頁 ── */
  .grid-letters{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;}
  .lcard{background:rgba(255,255,255,.07);border-radius:12px;padding:14px 10px;text-align:center;}
  .lcard .uy{font-size:2.2rem;color:var(--gold);display:block;}
  .lcard .latin{font-size:1rem;margin-top:4px;}
  .lcard .ipa{font-size:.8rem;color:var(--dim);}
  .wbsec h3{color:var(--gold);margin:22px 0 10px;font-size:1rem;}
  table.wb{width:100%;border-collapse:collapse;}
  table.wb td{padding:8px 6px;border-bottom:1px solid rgba(255,255,255,.08);font-size:.95rem;}
  table.wb td.uy{font-size:1.35rem;text-align:right;width:34%;color:var(--gold);}
  table.wb td.latin{color:var(--dim);width:30%;}

  /* ── 類別選擇 ── */
  .cats{display:flex;flex-wrap:wrap;gap:10px;margin:6px 0 20px;}
  .cat{
    background:rgba(255,255,255,.08);border:2px solid transparent;border-radius:20px;
    padding:8px 18px;cursor:pointer;font-size:.9rem;color:var(--text);font-family:inherit;
  }
  .cat.sel{border-color:var(--gold);background:rgba(255,211,105,.15);}

  /* ── 結果 ── */
  .result{text-align:center;padding:50px 20px;}
  .result .stars{font-size:3rem;letter-spacing:6px;margin:14px 0;}
  .result h2{font-size:1.6rem;color:var(--gold);}
  .result p{color:var(--dim);margin:12px 0 26px;line-height:1.8;}
  .pop{animation:pop .4s ease;}
  @keyframes pop{0%{transform:scale(.6);opacity:0;}100%{transform:scale(1);opacity:1;}}
  .shake{animation:shake .3s;}
  @keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-6px);}75%{transform:translateX(6px);}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1 id="appTitle"></h1>
    <div class="hright">
      <button class="langbtn" id="langBtn" onclick="toggleLang()"></button>
      <div class="xpbox">⭐ <span id="xpLabel"></span> <b id="xpVal">0</b>｜Lv.<b id="lvVal">1</b></div>
    </div>
  </header>

  <!-- ════ 主選單 ════ -->
  <div id="view-home">
    <div class="intro" id="introBox"></div>
    <div class="menu" id="menuBox"></div>
  </div>

  <!-- ════ 字母表 ════ -->
  <div id="view-letters" class="hidden">
    <div class="topbar">
      <button class="btn ghost back-btn" onclick="goHome()"></button>
      <span class="pill" id="lettersPill"></span>
    </div>
    <div class="grid-letters" id="letterGrid"></div>
  </div>

  <!-- ════ 單字本 ════ -->
  <div id="view-wordbook" class="hidden">
    <div class="topbar">
      <button class="btn ghost back-btn" onclick="goHome()"></button>
      <span class="pill" id="wordbookPill"></span>
    </div>
    <div id="wordbookBody"></div>
  </div>

  <!-- ════ 類別選擇 ════ -->
  <div id="view-cat" class="hidden">
    <div class="topbar">
      <button class="btn ghost back-btn" onclick="goHome()"></button>
      <span class="pill" id="catTitle"></span>
    </div>
    <p style="color:var(--dim);margin-bottom:8px;" id="catPrompt"></p>
    <div class="cats" id="catList"></div>
    <button class="btn gold" id="catGo"></button>
  </div>

  <!-- ════ 測驗（字母／單字／會話共用） ════ -->
  <div id="view-quiz" class="hidden">
    <div class="topbar">
      <button class="btn ghost" id="quitBtn" onclick="goHome()"></button>
      <span class="pill" id="quizInfo"></span>
      <span class="pill hearts" id="quizHearts"></span>
      <span class="pill"><span id="scoreLabel"></span> <b id="quizScore">0</b></span>
    </div>
    <div class="progress"><i id="quizProg"></i></div>
    <div class="qcard">
      <div class="label" id="qLabel"></div>
      <div class="big" id="qMain"></div>
      <div class="sub" id="qSub"></div>
    </div>
    <div class="opts" id="qOpts"></div>
    <div class="feedback" id="qFeed"></div>
  </div>

  <!-- ════ 翻翻樂 ════ -->
  <div id="view-memory" class="hidden">
    <div class="topbar">
      <button class="btn ghost" id="memQuit" onclick="goHome()"></button>
      <span class="pill"><span id="movesLabel"></span> <b id="memMoves">0</b></span>
      <span class="pill"><span id="pairsLabel"></span> <b id="memPairs">0</b>／8</span>
    </div>
    <div class="board" id="memBoard"></div>
  </div>

  <!-- ════ 結果 ════ -->
  <div id="view-result" class="hidden">
    <div class="result pop">
      <div class="stars" id="resStars"></div>
      <h2 id="resTitle"></h2>
      <p id="resDetail"></p>
      <button class="btn gold" id="resRetry"></button>
      <button class="btn ghost" id="resHome" onclick="goHome()"></button>
    </div>
  </div>
</div>

/* ═══════════════ 共用工具 ═══════════════ */
const $=id=>document.getElementById(id);
const VIEWS=["view-home","view-letters","view-wordbook","view-cat","view-quiz","view-memory","view-result"];
function show(v){VIEWS.forEach(x=>$(x).classList.toggle("hidden",x!==v));window.scrollTo(0,0);}
function goHome(){show("view-home");}
function shuffle(a){a=[...a];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function allWords(){return Object.values(WORDS).flat();}

/* ── 安全存取 localStorage（沙盒環境改用記憶體） ── */
const memStore={};
function safeGet(k){try{return localStorage.getItem(k);}catch(e){return memStore[k]??null;}}
function safeSet(k,v){try{localStorage.setItem(k,v);}catch(e){memStore[k]=String(v);}}

/* ── 語言 ── */
let lang="zh";
function T(){return UI[lang];}
function gloss(w){return lang==="ja"?w.ja:w.zh;}
function catName(c){return c==="ALL"?T().catAll:CATNAMES[c][lang];}
function detectLang(){
  const p=new URLSearchParams(location.search).get("lang");
  if(p==="ja"||p==="zh")return p;
  const saved=safeGet("uyghurLang");
  if(saved==="ja"||saved==="zh")return saved;
  return (navigator.language||"").toLowerCase().startsWith("ja")?"ja":"zh";
}
function toggleLang(){lang=lang==="zh"?"ja":"zh";safeSet("uyghurLang",lang);applyLang();goHome();}
function applyLang(){
  const t=T();
  document.documentElement.lang=t.htmlLang;
  document.title=t.title;
  $("appTitle").textContent=t.title;
  $("langBtn").textContent=t.langBtn;
  $("xpLabel").textContent=t.xpLabel;
  $("introBox").innerHTML=t.intro;
  $("menuBox").innerHTML=t.menu.map(m=>
    `<div class="mcard" onclick="${m.f}">
       <div class="emoji">${m.e}</div><h2>${m.t}</h2><p>${m.d}</p></div>`).join("");
  document.querySelectorAll(".back-btn").forEach(b=>b.textContent=t.back);
  $("quitBtn").textContent=t.quit;$("memQuit").textContent=t.quit;
  $("lettersPill").textContent=t.lettersPill;
  $("wordbookPill").textContent=t.wordbookPill;
  $("catPrompt").textContent=t.catPrompt;
  $("catGo").textContent=t.go;
  $("scoreLabel").textContent=t.scoreLabel;
  $("movesLabel").textContent=t.movesLabel;
  $("pairsLabel").textContent=t.pairsLabel;
  $("resRetry").textContent=t.retry;
  $("resHome").textContent=t.home;
}

/* ── 經驗值 ── */
function getXP(){return +(safeGet("uyghurXP")||0);}
function addXP(n){safeSet("uyghurXP",getXP()+n);renderXP();}
function renderXP(){$("xpVal").textContent=getXP();$("lvVal").textContent=Math.floor(getXP()/100)+1;}

/* ═══════════════ 字母表（預習） ═══════════════ */
function showStudyLetters(){
  $("letterGrid").innerHTML=LETTERS.map((x,i)=>
    `<div class="lcard"><span style="font-size:.7rem;color:var(--dim);">${i+1}</span>
     <span class="uy">${x.u}</span>
     <div class="latin">${x.l}</div><div class="ipa">${x.ipa}</div></div>`).join("");
  show("view-letters");
}

/* ═══════════════ 單字本（預習） ═══════════════ */
function showWordbook(){
  $("wordbookBody").innerHTML=Object.entries(WORDS).map(([cat,ws])=>
    `<div class="wbsec"><h3>${catName(cat)}${T().wordCount(ws.length)}</h3><table class="wb">`+
    ws.map(w=>`<tr><td class="uy">${w.u}</td><td class="latin">${w.l}</td><td>${gloss(w)}<span style="color:var(--dim);font-size:.78rem;">　${T().lesson(w.les)}</span></td></tr>`).join("")+
    `</table></div>`).join("");
  show("view-wordbook");
}

/* ═══════════════ 類別選擇 ═══════════════ */
let pendingMode=null,selectedCat="ALL";
function showCatPick(mode){
  pendingMode=mode;selectedCat="ALL";
  $("catTitle").textContent=mode==="quiz"?T().catQuiz:T().catMemory;
  const cats=["ALL",...Object.keys(WORDS)];
  $("catList").innerHTML=cats.map((c,i)=>
    `<button class="cat${c==="ALL"?" sel":""}" data-cat="${c}" onclick="pickCat(this)">${catName(c)}</button>`).join("");
  $("catGo").onclick=()=>pendingMode==="quiz"?startWordQuiz():startMemory();
  show("view-cat");
}
function pickCat(el){
  selectedCat=el.dataset.cat;
  document.querySelectorAll(".cat").forEach(b=>b.classList.remove("sel"));
  el.classList.add("sel");
}
function catWords(){return selectedCat==="ALL"?allWords():WORDS[selectedCat];}

/* ═══════════════ 測驗引擎（字母／單字／會話共用） ═══════════════ */
let Q={list:[],idx:0,score:0,hearts:3,combo:0,mode:"",retry:null};

function beginQuiz(list,mode,retryFn){
  Q={list,idx:0,score:0,hearts:3,combo:0,mode,retry:retryFn};
  show("view-quiz");renderQ();
}
function renderQ(){
  const q=Q.list[Q.idx];
  $("quizInfo").textContent=T().qNum(Q.idx+1,Q.list.length);
  $("quizHearts").textContent="❤️".repeat(Q.hearts)+"🖤".repeat(3-Q.hearts);
  $("quizScore").textContent=Q.score;
  $("quizProg").style.width=(Q.idx/Q.list.length*100)+"%";
  $("qLabel").textContent=q.label;
  $("qMain").innerHTML=q.main;
  $("qMain").className="big"+(q.mainUy?" uy":"");
  $("qSub").innerHTML=q.sub||"";
  $("qFeed").innerHTML="";
  $("qOpts").innerHTML="";
  q.opts.forEach(o=>{
    const b=document.createElement("button");
    b.className="opt";b.innerHTML=o.html;
    b.onclick=()=>answer(b,o.ok,q);
    $("qOpts").appendChild(b);
  });
}
function answer(btn,ok,q){
  document.querySelectorAll(".opt").forEach(b=>b.disabled=true);
  if(ok){
    btn.classList.add("correct");
    Q.combo++;const bonus=Q.combo>=3?5:0;
    Q.score+=10+bonus;addXP(10+bonus);
    $("qFeed").innerHTML=`${T().correct}${bonus?`<span class="combo"> ${T().combo(Q.combo,bonus)}</span>`:""}<br>${q.note||""}`;
  }else{
    btn.classList.add("wrong");btn.classList.add("shake");
    Q.combo=0;Q.hearts--;
    [...document.querySelectorAll(".opt")].forEach((b,i)=>{
      if(q.opts[i].ok)b.classList.add("correct");
    });
    $("qFeed").innerHTML=`${T().wrong}<br>${q.note||""}`;
    $("quizHearts").textContent="❤️".repeat(Q.hearts)+"🖤".repeat(3-Q.hearts);
  }
  setTimeout(()=>{
    if(Q.hearts<=0)return endQuiz(false);
    Q.idx++;
    if(Q.idx>=Q.list.length)return endQuiz(true);
    renderQ();
  },ok?1400:2600);
}
function endQuiz(finished){
  const total=Q.list.length*10;
  const pct=Q.score/total;
  const stars=!finished?"💔":pct>=0.9?"⭐⭐⭐":pct>=0.6?"⭐⭐":"⭐";
  showResult(
    stars,
    !finished?T().noLife:pct>=0.9?T().great:T().done,
    `${T().resScore(Q.score,total)}${finished?"":T().resStopped(Q.idx+1)}<br>${T().resXP(Q.score)}`,
    Q.retry
  );
}

/* ── 字母挑戰 ── */
function startLetterQuiz(){
  const picks=shuffle(LETTERS).slice(0,10);
  const list=picks.map(L=>{
    const others=shuffle(LETTERS.filter(x=>x.l!==L.l)).slice(0,3);
    if(Math.random()<0.5){
      return{label:T().letterQ1,main:L.u,mainUy:true,
        opts:shuffle([{html:`${L.l}　<span style="color:var(--dim)">${L.ipa}</span>`,ok:true},
          ...others.map(o=>({html:`${o.l}　<span style="color:var(--dim)">${o.ipa}</span>`,ok:false}))]),
        note:`<span class="uy">${L.u}</span> ＝ ${L.l} ${L.ipa}`};
    }else{
      return{label:T().letterQ2,main:`${L.l}　${L.ipa}`,mainUy:false,
        opts:shuffle([{html:`<span class="uy">${L.u}</span>`,ok:true},
          ...others.map(o=>({html:`<span class="uy">${o.u}</span>`,ok:false}))]),
        note:`${L.l} ${L.ipa} ＝ <span class="uy">${L.u}</span>`};
    }
  });
  beginQuiz(list,"letter",startLetterQuiz);
}

/* ── 單字測驗 ── */
function startWordQuiz(){
  const pool=catWords();
  const picks=shuffle(pool).slice(0,Math.min(10,pool.length));
  const list=picks.map(W=>{
    const others=shuffle(pool.filter(x=>x.u!==W.u)).slice(0,3);
    const note=`<span class="uy">${W.u}</span>（${W.l}）＝ ${gloss(W)}　${T().lesson(W.les)}`;
    if(Math.random()<0.5){
      return{label:T().wordQ1,main:W.u,mainUy:true,sub:W.l,
        opts:shuffle([{html:gloss(W),ok:true},...others.map(o=>({html:gloss(o),ok:false}))]),note};
    }else{
      return{label:T().wordQ2(gloss(W)),main:gloss(W),mainUy:false,
        opts:shuffle([{html:`<span class="uy">${W.u}</span><br><small style="color:var(--dim)">${W.l}</small>`,ok:true},
          ...others.map(o=>({html:`<span class="uy">${o.u}</span><br><small style="color:var(--dim)">${o.l}</small>`,ok:false}))]),note};
    }
  });
  beginQuiz(list,"word",startWordQuiz);
}

/* ── 會話挑戰 ── */
function startDialogue(){
  const list=shuffle(DIALOGUES).map(D=>({
    label:D.q[lang],
    main:D.qu,mainUy:true,sub:D.ql,
    opts:shuffle([
      {html:`<span class="uy">${D.a.u}</span><br><small style="color:var(--dim)">${D.a.l}</small>`,ok:true},
      ...D.d.map(o=>({html:`<span class="uy">${o.u}</span><br><small style="color:var(--dim)">${o.l}</small>`,ok:false}))
    ]),
    note:`${T().answerIs}<span class="uy">${D.a.u}</span>（${D.a.l}）＝「${D.a[lang]}」　${T().lesson(D.les)}`
  }));
  beginQuiz(list,"dialogue",startDialogue);
}

/* ═══════════════ 翻翻樂 ═══════════════ */
let M={first:null,lock:false,moves:0,pairs:0};
function startMemory(){
  const picks=shuffle(catWords()).slice(0,8);
  const cards=shuffle(picks.flatMap((w,i)=>[
    {key:i,html:`<span class="uy">${w.u}</span>`},
    {key:i,html:`${gloss(w)}<br><small style="color:var(--dim)">${w.l}</small>`},
  ]));
  M={first:null,lock:false,moves:0,pairs:0};
  $("memMoves").textContent=0;$("memPairs").textContent=0;
  $("memBoard").innerHTML=cards.map(c=>
    `<div class="tile" data-key="${c.key}" onclick="flipTile(this)">
       <div class="tile-inner">
         <div class="face back">❓</div>
         <div class="face front">${c.html}</div>
       </div></div>`).join("");
  show("view-memory");
}
function flipTile(t){
  if(M.lock||t.classList.contains("flip")||t.classList.contains("done"))return;
  t.classList.add("flip");
  if(!M.first){M.first=t;return;}
  M.moves++;$("memMoves").textContent=M.moves;
  const a=M.first,b=t;M.first=null;
  if(a.dataset.key===b.dataset.key){
    a.classList.add("done");b.classList.add("done");
    M.pairs++;$("memPairs").textContent=M.pairs;
    if(M.pairs===8){
      const stars=M.moves<=12?"⭐⭐⭐":M.moves<=18?"⭐⭐":"⭐";
      const xp=M.moves<=12?80:M.moves<=18?60:40;
      addXP(xp);
      setTimeout(()=>showResult(stars,T().memDone,`${T().memMoves(M.moves)}<br>${T().resXP(xp)}`,startMemory),600);
    }
  }else{
    M.lock=true;
    setTimeout(()=>{a.classList.remove("flip");b.classList.remove("flip");M.lock=false;},900);
  }
}

/* ═══════════════ 結果頁 ═══════════════ */
function showResult(stars,title,detail,retryFn){
  $("resStars").textContent=stars;
  $("resTitle").textContent=title;
  $("resDetail").innerHTML=detail;
  $("resRetry").onclick=retryFn;
  show("view-result");
}

/* ═══════════════ 初始化 ═══════════════ */
lang=detectLang();
applyLang();
renderXP();
</script>
